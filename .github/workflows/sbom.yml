name: CI - Pre-commit Checks

on:
  pull_request:
    branches: [main, develop, feature/anji]
  push:
    branches: [main, develop, feature/anji]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and Format
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff format check
        run: ruff format --check .

      - name: Run ruff linter
        run: ruff check .

      - name: Run mypy type checker
        run: mypy .

  test:
    runs-on: ubuntu-latest
    name: Run Unit and E2E Tests
    
    # Start a real Postgres database for the runner
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Install Playwright Browsers
        run: poetry run playwright install --with-deps chromium

      - name: Setup Database Schema
        run: |
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -c "CREATE TABLE defect_occurrences (id SERIAL PRIMARY KEY, lot_id VARCHAR(50), defect_type VARCHAR(100), quantity INT, occurrence_date DATE);"
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -c "INSERT INTO defect_occurrences (lot_id, defect_type, quantity, occurrence_date) VALUES ('TEST-LOT', 'Initial Setup', 1, '2026-03-09');"

      - name: Run Streamlit in Background
        # The '&' runs it in the background so the next step (pytest) can execute
        run: |
          poetry run streamlit run app.py --server.port 8501 --server.headless true &
          sleep 5 # Give Streamlit a few seconds to boot up

      - name: Run all tests
        run: poetry run pytest --cov=defect_dashboard --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella