name: CI - Pre-commit Checks

on:
  pull_request:
    branches: [main, develop, feature/anji]
  push:
    branches: [main, develop, feature/anji]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint and Format

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov

      - name: Run ruff format check
        run: python -m ruff format --check .

      - name: Run ruff linter
        run: python -m ruff check .

      - name: Run mypy type checker
        run: python -m mypy .

  test:
    runs-on: ubuntu-latest
    name: Run Unit Tests

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-playwright playwright

      - name: Install Playwright browsers
        run: playwright install --with-deps

      - name: Initialize database schema
        run: |
          psql postgresql://postgres:postgres@localhost:5432/test_db < db/schema.sql
          psql postgresql://postgres:postgres@localhost:5432/test_db < db/seed.sql

      - name: Run unit tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/test_db
        run: |
          python -m pytest --cov=defect_dashboard --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
  docker-build:
    runs-on: ubuntu-latest
    name: Build Docker Image
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t markdown-demo:latest .